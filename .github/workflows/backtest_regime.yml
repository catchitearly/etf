name: ETF Regime-Adaptive Backtest

on:
  schedule:
    - cron: '0 4 * * 5'   # Every Friday 4:00 AM UTC = 9:30 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache yfinance data
        uses: actions/cache@v4
        with:
          path: .cache/regime
          key: yf-regime-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: yf-regime-${{ runner.os }}-

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Install Chart.js via npm so it can be embedded inline
          npm install chart.js@4.4.1 chartjs-adapter-date-fns@3.0.0 date-fns@2.30.0
          rm -rf ~/.cache/py-yfinance || true

      - name: Run regime backtest
        run: python regime_backtest.py

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "regime backtest: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
