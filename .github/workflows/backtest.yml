name: Run ETF Matrix Backtest

on:
  schedule:
    # Runs at 16:30 IST (11:00 UTC) every Friday after Indian markets close
    - cron: '0 11 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Request Cache Paths
      uses: actions/cache@v4
      with:
        path: .cache/yfinance_net.cache
        key: ${{ runner.os }}-yf-cache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-yf-cache-

    - name: Force Clean Modern Dependencies
      run: |
        python -m pip install --upgrade pip
        pip uninstall yfinance pandas-datareader requests -y
        pip install --no-cache-dir yfinance pandas requests requests-cache numpy

    - name: Run Backtest Script
      run: python backtest.py

    - name: Commit and Push Dashboard Update
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/index.html
        # Only commit if the dashboard file actually changed
        git diff-index --quiet HEAD || git commit -m "Automated Dashboard Refresh: $(date -u +'%Y-%m-%d %H:%M') UTC"
        git push
